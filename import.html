function log(m,c){const e=document.getElementById('log');const d=document.createElement('div');d.className=c||'';d.textContent=m;e.appendChild(d);e.scrollTop=e.scrollHeight;}
function bar(p){document.getElementById('bar').style.width=p+'%';}
window.start = async function(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='En cours...';
  log('Suppression...','info');
  try{const snap=await getDocs(collection(db,'partenaires'));for(const d of snap.docs)await deleteDoc(doc(db,'partenaires',d.id));log('OK : '+snap.size+' supprimes','ok');}catch(e){log('Erreur : '+e.message,'err');}
  let ok=0;
  for(let i=0;i<DATA.length;i++){
    try{await addDoc(collection(db,'partenaires'),DATA[i]);ok++;log((i+1)+'/'+DATA.length+' : '+DATA[i].name,'ok');}
    catch(e){log('ERREUR '+DATA[i].name,'err');}
    bar(Math.round((i+1)/DATA.length*100));
    await new Promise(r=>setTimeout(r,200));
  }
  log('Termine ! '+ok+'/'+DATA.length,'ok');btn.textContent=ok+'/'+DATA.length+' importes !';
};
