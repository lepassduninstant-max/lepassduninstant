<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Import ABC Informatique</title>
<style>body{font-family:sans-serif;max-width:600px;margin:20px auto;padding:20px;background:#FAF6F1;color:#3D2B1F;}.log{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;height:200px;overflow-y:auto;font-size:12px;font-family:monospace;margin:12px 0;}button{background:#3D2B1F;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:14px;cursor:pointer;}button:disabled{opacity:0.5;}.ok{color:green;}.err{color:red;}.info{color:blue;}</style>
</head>
<body>
<h1>🖥️ ABC Informatique — 2ème adresse</h1>
<div class="log" id="log"><div class="info">Prêt.</div></div>
<button id="btn" onclick="lancer()">▶ Ajouter</button>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyAyxBcBByp"+"Srspnc_5RcLmhR2RuVwPa5ZQ",authDomain:"pass-instant.firebaseapp.com",projectId:"pass-instant",storageBucket:"pass-instant.firebasestorage.app",messagingSenderId:"234758483474",appId:"1:234758483474:web:7d739963a99a7bd573f2cb"});
var db=firebase.firestore();
function log(msg,cls){var el=document.getElementById('log');var d=document.createElement('div');if(cls)d.className=cls;d.textContent=msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
async function geocode(adresse){try{var r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(adresse)+'&format=json&limit=1',{headers:{'User-Agent':'PassInstant/1.0'}});var res=await r.json();if(res&&res.length>0)return[parseFloat(res[0].lat),parseFloat(res[0].lon)];}catch(e){}return null;}
async function lancer(){
  var btn=document.getElementById('btn');btn.disabled=true;
  log('Géocodage...','info');
  var coords=await geocode('ZAC du parc, 12 Allée des Marettes, 80130 Friville-Escarbotin, France');
  if(coords&&coords[0]>49){
    log('✅ Coords: '+coords[0].toFixed(5)+', '+coords[1].toFixed(5),'ok');
  }else{
    coords=[50.06234, 1.55678];
    log('⚠️ Géocodage échoué, coords approx Friville','warn');
  }
  await db.collection('partenaires').add({
    name:'ABC Informatique',
    cat:'bonus',
    zone:'tous-secteurs',
    adresse:'ZAC du parc, 12 Allée des Marettes, 80130 Friville-Escarbotin',
    tel:'03 22 20 74 74',
    avantage:'5% sur achat materiel, 10% sur maintenance',
    code:'ABCINFORMATI2026',
    coords:coords,
    dist:0,
    flash:null
  });
  log('✅ Entrée Friville-Escarbotin ajoutée !','ok');
  btn.textContent='Terminé !';
}
</script></body></html>
