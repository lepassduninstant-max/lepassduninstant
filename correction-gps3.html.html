<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Correction GPS 3</title>
<style>body{font-family:sans-serif;max-width:600px;margin:20px auto;padding:20px;background:#FAF6F1;color:#3D2B1F;}.log{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;height:300px;overflow-y:auto;font-size:11px;font-family:monospace;margin:12px 0;}button{background:#3D2B1F;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:14px;cursor:pointer;}button:disabled{opacity:0.5;}.bar-wrap{height:8px;background:#eee;border-radius:4px;margin:8px 0;}.bar{height:8px;background:#C4A882;border-radius:4px;width:0;transition:width 0.3s;}.ok{color:green;}.err{color:red;}.info{color:blue;}.warn{color:orange;}</style>
</head>
<body>
<h1>🗺️ Correction GPS 3 — 6 partenaires</h1>
<div class="bar-wrap"><div class="bar" id="bar"></div></div>
<div class="log" id="log"><div class="info">Prêt.</div></div>
<button id="btn" onclick="lancer()">▶ Lancer</button>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyAyxBcBByp"+"Srspnc_5RcLmhR2RuVwPa5ZQ",authDomain:"pass-instant.firebaseapp.com",projectId:"pass-instant",storageBucket:"pass-instant.firebasestorage.app",messagingSenderId:"234758483474",appId:"1:234758483474:web:7d739963a99a7bd573f2cb"});
var db=firebase.firestore();
var CORRECTIONS=[{"name": "La Guinguette de Petit Port", "adresse": "2 Rue Principale, 80230 Saigneville, France"}, {"name": "La Boutique de l'Oncle Eugène", "adresse": "20 Place de la Libération, 80230 Estrébœuf, France"}, {"name": "La Belle Etoile", "adresse": "14 Place Georges Clemenceau, 80410 Cayeux-sur-Mer, France"}, {"name": "La Cabine Mystère by Locked", "adresse": "1015 Boulevard du Général Sizaire, 80410 Cayeux-sur-Mer, France"}, {"name": "Le Petit Baigneur", "adresse": "1052 Boulevard du Général Sizaire, 80410 Cayeux-sur-Mer, France"}, {"name": "Le Baie Beach Bar", "adresse": "1240 Boulevard du Général Sizaire, 80410 Cayeux-sur-Mer, France"}];
function log(msg,cls){var el=document.getElementById('log');var d=document.createElement('div');if(cls)d.className=cls;d.textContent=msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
async function geocode(adresse){try{var r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(adresse)+'&format=json&limit=1',{headers:{'User-Agent':'PassInstant/1.0'}});var res=await r.json();if(res&&res.length>0)return[parseFloat(res[0].lat),parseFloat(res[0].lon)];}catch(e){}return null;}
async function lancer(){
  var btn=document.getElementById('btn');btn.disabled=true;
  log('Chargement Firebase...','info');
  var snap=await db.collection('partenaires').get();
  var docs={};snap.forEach(function(d){docs[d.data().name]=d.id;});
  log(Object.keys(docs).length+' partenaires chargés','ok');
  var ok=0,err=0;
  for(var i=0;i<CORRECTIONS.length;i++){
    var c=CORRECTIONS[i];
    document.getElementById('bar').style.width=Math.round((i+1)/CORRECTIONS.length*100)+'%';
    log((i+1)+'/'+CORRECTIONS.length+' - '+c.name);
    var coords=await geocode(c.adresse);
    if(coords&&coords[0]>49&&coords[0]<52){
      var docId=docs[c.name];
      if(docId){await db.collection('partenaires').doc(docId).update({coords:coords});log('  ✅ '+coords[0].toFixed(5)+', '+coords[1].toFixed(5),'ok');ok++;}
      else{log('  ⚠️ Non trouvé: '+c.name,'warn');}
    }else{log('  ❌ Géocodage échoué','err');err++;}
    await new Promise(function(r){setTimeout(r,1200);});
  }
  log('✅ '+ok+' corrigés, ❌ '+err+' erreurs','info');
  btn.textContent='Terminé !';
}
</script></body></html>
